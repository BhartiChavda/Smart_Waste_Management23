{% extends 'layouts/base_public.html' %}

{% block title %}Contact Us - EcoNova AI{% endblock %}

{% block content %}
<div class="bg-white dark:bg-gray-950 transition-colors duration-300 py-24 sm:py-32">
  <div class="mx-auto max-w-7xl px-6 lg:px-8">
    <div class="mx-auto max-w-2xl sm:text-center mb-16">
      <h2 class="text-3xl font-bold tracking-tight text-gray-900 dark:text-white sm:text-4xl">Contact Us</h2>
      <p class="mt-6 text-lg leading-8 text-gray-600 dark:text-gray-400">Have questions about deploying EcoNova AI in your city? Reach out to our team.</p>
    </div>
    
    <div class="mx-auto max-w-lg glass p-8 rounded-3xl shadow-xl">
      <form action="#" method="POST" class="space-y-6">
        <div>
          <label for="name" class="block text-sm font-medium leading-6 text-gray-900 dark:text-white">Name</label>
          <div class="mt-2">
            <input type="text" name="name" id="name" autocomplete="name" class="block w-full rounded-xl border-0 py-2 px-3 text-gray-900 dark:text-white dark:bg-gray-800 shadow-sm ring-1 ring-inset ring-gray-300 dark:ring-gray-700 placeholder:text-gray-400 focus:ring-2 focus:ring-inset focus:ring-primary-600 sm:text-sm sm:leading-6">
          </div>
        </div>

        <div>
          <label for="email" class="block text-sm font-medium leading-6 text-gray-900 dark:text-white">Email address</label>
          <div class="mt-2">
            <input type="email" name="email" id="email" autocomplete="email" class="block w-full rounded-xl border-0 py-2 px-3 text-gray-900 dark:text-white dark:bg-gray-800 shadow-sm ring-1 ring-inset ring-gray-300 dark:ring-gray-700 placeholder:text-gray-400 focus:ring-2 focus:ring-inset focus:ring-primary-600 sm:text-sm sm:leading-6">
          </div>
        </div>

        <div>
          <label for="message" class="block text-sm font-medium leading-6 text-gray-900 dark:text-white">Message</label>
          <div class="mt-2">
            <textarea id="message" name="message" rows="4" class="block w-full rounded-xl border-0 py-2 px-3 text-gray-900 dark:text-white dark:bg-gray-800 shadow-sm ring-1 ring-inset ring-gray-300 dark:ring-gray-700 placeholder:text-gray-400 focus:ring-2 focus:ring-inset focus:ring-primary-600 sm:text-sm sm:leading-6"></textarea>
          </div>
        </div>

        <div>
          <button type="submit" class="w-full justify-center rounded-xl bg-primary-600 px-3 py-3 text-sm font-semibold text-white shadow-sm hover:bg-primary-500 focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-primary-600 transition-all">Send Message</button>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
