{% extends 'layouts/base_admin.html' %}

{% block title %}Reports - EcoNova AI{% endblock %}

{% block content %}
<div class="glass p-6 md:p-8 rounded-2xl shadow-sm border border-gray-200 dark:border-gray-800 mb-8 relative overflow-hidden flex flex-col sm:flex-row sm:items-center justify-between gap-6">
    <!-- Subtle Background Glow -->
    <div class="absolute -top-10 -left-10 w-40 h-40 bg-primary-400 rounded-full mix-blend-multiply filter blur-3xl opacity-10"></div>

    <div class="flex items-center gap-5 relative z-10">
        <a href="{% url 'admin_dashboard' %}" class="w-12 h-12 rounded-full bg-white dark:bg-gray-800 text-gray-600 dark:text-gray-300 border border-gray-200 dark:border-gray-700 flex items-center justify-center hover:bg-primary-50 dark:hover:bg-primary-900/30 hover:text-primary-600 transition-all shadow-md hover:scale-105 group">
            <i class="fas fa-arrow-left group-hover:-translate-x-1 transition-transform"></i>
        </a>
        <div>
            <h1 class="text-3xl md:text-4xl font-extrabold tracking-tight bg-clip-text text-transparent bg-gradient-to-r from-gray-900 to-gray-600 dark:from-white dark:to-gray-300 mb-1">
                System Reports
            </h1>
            <p class="text-gray-500 dark:text-gray-400 text-sm md:text-base font-medium flex items-center gap-2">
                <i class="fas fa-chart-pie text-primary-500"></i> Export data and analyze historical trends.
            </p>
        </div>
    </div>
    
    <div class="relative z-10 flex flex-wrap gap-4">
        <a href="?export=csv" class="group relative inline-flex items-center justify-center gap-2 px-6 py-3 font-semibold text-white transition-all duration-200 bg-primary-600 border border-transparent rounded-xl hover:bg-primary-500 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary-600 shadow-lg shadow-primary-500/30 hover:-translate-y-0.5 overflow-hidden">
            <span class="absolute w-0 h-0 transition-all duration-500 ease-out bg-white rounded-full group-hover:w-56 group-hover:h-56 opacity-10"></span>
            <i class="fas fa-file-csv text-lg"></i> 
            <span>Generate CSV Report</span>
        </a>
        <a href="?export=pdf" class="group relative inline-flex items-center justify-center gap-2 px-6 py-3 font-semibold text-white transition-all duration-200 bg-red-600 border border-transparent rounded-xl hover:bg-red-500 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-red-600 shadow-lg shadow-red-500/30 hover:-translate-y-0.5 overflow-hidden">
            <span class="absolute w-0 h-0 transition-all duration-500 ease-out bg-white rounded-full group-hover:w-56 group-hover:h-56 opacity-10"></span>
            <i class="fas fa-file-pdf text-lg"></i> 
            <span>Generate PDF Report</span>
        </a>
    </div>
</div>
<div class="glass p-8 rounded-2xl shadow-sm border border-gray-200 dark:border-gray-800 relative overflow-hidden">
    <!-- Decorative background blobs -->
    <div class="absolute -top-10 -right-10 w-40 h-40 bg-primary-400 rounded-full mix-blend-multiply filter blur-3xl opacity-20 animate-blob"></div>
    <div class="absolute -bottom-10 -left-10 w-40 h-40 bg-pink-400 rounded-full mix-blend-multiply filter blur-3xl opacity-20 animate-blob animation-delay-2000"></div>

    <h2 class="text-xl font-bold text-gray-900 dark:text-white mb-6 text-center relative z-10">Complaints by Category</h2>
    
    <div class="relative h-96 w-full max-w-2xl mx-auto z-10">
        <canvas id="categoryChart"></canvas>
    </div>
</div>
{% endblock %}

{% block extra_scripts %}
<script>
    document.addEventListener("DOMContentLoaded", function() {
        fetch("{% url 'chart_data' %}")
            .then(response => response.json())
            .then(data => {
                const ctx = document.getElementById('categoryChart').getContext('2d');
                
                // Premium color palette
                const colors = [
                    'rgba(34, 197, 94, 0.85)',   // Green
                    'rgba(59, 130, 246, 0.85)',  // Blue
                    'rgba(239, 68, 68, 0.85)',   // Red
                    'rgba(245, 158, 11, 0.85)',  // Yellow/Orange
                    'rgba(168, 85, 247, 0.85)',  // Purple
                    'rgba(236, 72, 153, 0.85)'   // Pink
                ];
                
                const borderColors = colors.map(color => color.replace('0.85', '1'));

                new Chart(ctx, {
                    type: 'doughnut',
                    data: {
                        labels: data.labels,
                        datasets: [{
                            label: ' Complaints',
                            data: data.data,
                            backgroundColor: colors,
                            borderColor: document.documentElement.classList.contains('dark') ? '#1f2937' : '#ffffff',
                            borderWidth: 4,
                            hoverOffset: 12,
                            borderRadius: 8
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        layout: {
                            padding: 20
                        },
                        plugins: {
                            legend: {
                                position: 'bottom',
                                labels: {
                                    color: document.documentElement.classList.contains('dark') ? '#d1d5db' : '#374151',
                                    padding: 25,
                                    font: {
                                        family: "'Inter', sans-serif",
                                        size: 14,
                                        weight: '600'
                                    },
                                    usePointStyle: true,
                                    pointStyle: 'circle'
                                }
                            },
                            tooltip: {
                                backgroundColor: document.documentElement.classList.contains('dark') ? 'rgba(17, 24, 39, 0.9)' : 'rgba(255, 255, 255, 0.9)',
                                titleColor: document.documentElement.classList.contains('dark') ? '#f3f4f6' : '#111827',
                                bodyColor: document.documentElement.classList.contains('dark') ? '#d1d5db' : '#4b5563',
                                borderColor: document.documentElement.classList.contains('dark') ? 'rgba(75, 85, 99, 0.3)' : 'rgba(229, 231, 235, 1)',
                                borderWidth: 1,
                                padding: 12,
                                boxPadding: 6,
                                usePointStyle: true,
                                titleFont: { size: 14, family: "'Inter', sans-serif", weight: 'bold' },
                                bodyFont: { size: 14, family: "'Inter', sans-serif" },
                                callbacks: {
                                    label: function(context) {
                                        let label = context.label || '';
                                        if (label) {
                                            label += ': ';
                                        }
                                        if (context.parsed !== null) {
                                            label += context.parsed + ' items';
                                        }
                                        return label;
                                    }
                                }
                            }
                        },
                        animation: {
                            animateScale: true,
                            animateRotate: true,
                            duration: 2000,
                            easing: 'easeOutQuart'
                        },
                        cutout: '65%'
                    }
                });
            })
            .catch(error => console.error("Error fetching chart data:", error));
    });
</script>
{% endblock %}
